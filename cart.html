<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart | Urban Aura Apparel</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">Urban Aura</a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="header-actions">
        <a class="cart-link" href="cart.html">Cart <span id="cart-count">0</span></a>
        <button id="nav-toggle" class="nav-toggle" aria-label="Open navigation">☰</button>
      </div>
    </div>
  </header>

  <main>
    <section class="section section-hero small-hero">
      <div class="container hero-content">
        <div>
          <span class="eyebrow">Your cart</span>
          <h1>Review your selections before checkout.</h1>
          <p>Items added to your cart will stay available while you browse.</p>
        </div>
      </div>
    </section>

    <section class="section section-cart">
      <div class="container cart-wrapper">
        <div id="cart-items" class="cart-items"></div>
        <aside class="cart-summary">
          <h2>Order summary</h2>
          <div class="summary-row">
            <span>Items</span>
            <span id="summary-count">0</span>
          </div>
          <div class="summary-row">
            <span>Total</span>
            <span id="summary-total">$0</span>
          </div>
          <button class="btn btn-primary disabled" id="checkout-button" disabled>Proceed to checkout</button>
          <p class="note">This is a demo cart interface with local browser storage.</p>
        </aside>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>Urban Aura Apparel © 2026</p>
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
